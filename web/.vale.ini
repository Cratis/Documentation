# Vale configuration for the Cratis documentation.
#
# Vale (https://vale.sh) is an optional prose linter. It is NOT required to build
# the site — `npm run lint:prose` runs it only when the `vale` binary is present
# and skips gracefully otherwise (see scripts/lint-prose.mjs). To use it locally:
#
#   brew install vale          # or see https://vale.sh/docs/vale-cli/installation/
#   vale sync                  # downloads the Microsoft style package below
#   npm run lint:prose
#
# The zero-dependency structural checks in scripts/lint-docs.mjs always run as part
# of `npm run check`; Vale layers richer style analysis on top when available.

StylesPath = .vale/styles
MinAlertLevel = suggestion

# Pull in the Microsoft Writing Style Guide rules (downloaded by `vale sync`).
Packages = Microsoft

# Lint the converted, built content (generated by `npm run sync`).
Vocab = Cratis

[*.{md,mdx}]
BasedOnStyles = Vale, Microsoft

# The house terminology lives in .vale/styles/Vocab/Cratis — keep brand and
# event-sourcing terms from being flagged as misspellings or inconsistencies.

# Code-heavy reference pages use these conversational words deliberately; downgrade
# the noisiest Microsoft rules to suggestions so they inform without nagging.
Microsoft.Adverbs = suggestion
Microsoft.Contractions = NO
Microsoft.FirstPerson = suggestion
